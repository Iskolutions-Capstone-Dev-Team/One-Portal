services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: one_portal_frontend
    restart: always
    env_file: ./.env
    ports:
      - "5174:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_BACKEND_URL: ${VITE_BACKEND_URL}
      VITE_PROXY_TARGET_URL: ${VITE_PROXY_TARGET_URL}
      VITE_BACKEND_API_KEY: ${VITE_BACKEND_API_KEY}
    networks:
      - one_portal_network

# Cache
  one_portal_redis:
    image: redis:7-alpine
    container_name: one_portal_redis
    restart: always
    # Ephemeral memory-only mode — no AOF/RDB persistence.
    # Optimal for a 2vCPU Lightsail instance: avoids disk I/O
    # overhead on every cache write. Data re-warms automatically
    # on restart since all cached values have short TTLs.
    command: redis-server --save "" --appendonly no
    networks:
      - one_portal_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: one_portal_backend
    restart: always
    env_file: ./.env
    environment:
      - GODEBUG=http2debug=0,asyncpreemptoff=1
      - REDIS_URL=${REDIS_URL}
    ports:
      - "8000:8080"
    volumes:
      - .env:/app/.env
    working_dir: /app
    networks:
      - one_portal_network
    depends_on:
      oneportal_database:
        condition: service_healthy
      one_portal_redis:
        condition: service_healthy
    # Log rotation configuration
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"

# Database Application
  oneportal_database:
    image: mysql:8.4
    container_name: one_portal_database
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DB_NAME: ${MYSQL_DB_NAME}
      ADMIN_SQL_USER: ${ADMIN_SQL_USER}
      ADMIN_SQL_PASSWORD: ${ADMIN_SQL_PASSWORD}
      APP_USER: ${APP_USER}
      APP_PASSWORD: ${APP_PASSWORD}
    ports:
      - "3361:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./scripts/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      - one_portal_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  one_portal_network:
    driver: bridge

volumes:
  db_data:
  frontend_node_modules:
