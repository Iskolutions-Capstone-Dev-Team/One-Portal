name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - development
      - main
  push:
    branches:
      - development
      - main

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Backend - Format Check
        run: |
          cd backend
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Backend - Staticcheck
        run: |
          cd backend
          go install honnef.co/go/tools/cmd/staticcheck@latest
          $(go env GOPATH)/bin/staticcheck ./...

      - name: Backend - Unit Tests
        run: |
          cd backend
          go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Backend - Build Check
        run: |
          cd backend
          go build ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend - Lint
        run: |
          cd frontend
          npm install
          npm run lint

      - name: Frontend - Build Check
        run: |
          cd frontend
          npm run build

  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USERNAME }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/iskolutions-capstone-dev-team/one-portal-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/iskolutions-capstone-dev-team/one-portal-frontend:latest

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean Staging App Images and Copy Compose file
        env:
          STAGING_HOST: ${{ secrets.STAGING_IP }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_KEY: ${{ secrets.STAGING_SSH_PK }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$STAGING_KEY" > "$HOME/.ssh/staging_key"
          chmod 600 "$HOME/.ssh/staging_key"
          ssh -i "$HOME/.ssh/staging_key" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$STAGING_USER@$STAGING_HOST" \
            '
            set -e
            APP_DIR="$HOME/One-Portal"
            COMPOSE_FILE="$APP_DIR/docker-compose.ghcr.yml"

            mkdir -p "$APP_DIR"
            chmod 755 "$APP_DIR"

            docker rm -f one_portal_backend one_portal_frontend >/dev/null 2>&1 || true
            docker image rm -f \
              ghcr.io/iskolutions-capstone-dev-team/one-portal-backend:latest \
              ghcr.io/iskolutions-capstone-dev-team/one-portal-frontend:latest \
              >/dev/null 2>&1 || true

            cat > "$COMPOSE_FILE"
            ' \
            < docker-compose.ghcr.yml

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_IP }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_PK }}
          script: |
            cd "$HOME/One-Portal"
            git pull origin development
            echo "${{ secrets.GH_PAT }}" | \
              docker login ghcr.io -u ${{ secrets.GH_USERNAME }} \
              --password-stdin
            docker compose -f docker-compose.ghcr.yml pull
            docker compose -f docker-compose.ghcr.yml up -d

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean Production App Images and Copy Compose file
        env:
          PRODUCTION_HOST: ${{ secrets.VPS_IP }}
          PRODUCTION_USER: ${{ secrets.VPS_USER }}
          PRODUCTION_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$PRODUCTION_KEY" > "$HOME/.ssh/production_key"
          chmod 600 "$HOME/.ssh/production_key"
          ssh -i "$HOME/.ssh/production_key" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$PRODUCTION_USER@$PRODUCTION_HOST" \
            '
            set -e
            APP_DIR="$HOME/One-Portal"
            COMPOSE_FILE="$APP_DIR/docker-compose.ghcr.yml"

            mkdir -p "$APP_DIR"
            chmod 755 "$APP_DIR"

            docker rm -f one_portal_backend one_portal_frontend >/dev/null 2>&1 || true
            docker image rm -f \
              ghcr.io/iskolutions-capstone-dev-team/one-portal-backend:latest \
              ghcr.io/iskolutions-capstone-dev-team/one-portal-frontend:latest \
              >/dev/null 2>&1 || true

            cat > "$COMPOSE_FILE"
            ' \
            < docker-compose.ghcr.yml

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd "$HOME/One-Portal"
            git pull origin main
            echo "${{ secrets.GH_PAT }}" | \
              docker login ghcr.io -u ${{ secrets.GH_USERNAME }} \
              --password-stdin
            docker compose -f docker-compose.ghcr.yml pull
            docker compose -f docker-compose.ghcr.yml up -d
