definitions:
  dto.CallbackRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  dto.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  dto.ClientDetailedAccessResponse:
    properties:
      base_url:
        type: string
      description:
        type: string
      id:
        type: string
      image_location:
        type: string
      name:
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  dto.LogListResponse:
    properties:
      logs:
        items:
          $ref: '#/definitions/models.Log'
        type: array
    type: object
  dto.MeResponse:
    properties:
      allowed_clients:
        items:
          type: string
        type: array
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      name_suffix:
        type: string
    type: object
  dto.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  dto.UpdatePasswordByEmailRequest:
    properties:
      email:
        type: string
      new_password:
        type: string
    required:
    - email
    - new_password
    type: object
  dto.UpdateUserNameRequest:
    properties:
      first_name:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      name_suffix:
        type: string
    required:
    - first_name
    - last_name
    type: object
  models.Log:
    properties:
      action:
        type: string
      actor:
        type: string
      created_at:
        type: string
      id:
        type: integer
      result:
        type: string
    type: object
info:
  contact:
    email: support@oneportal.isaxbsit2027.com
    name: API Support
  description: API for One Portal application.
  title: One Portal API
  version: "1.0"
paths:
  /api/v1/logs:
    get:
      consumes:
      - application/json
      description: Returns log records filtered by actor substring, with pagination
        support.
      parameters:
      - description: Actor filter substring
        in: query
        name: actor
        type: string
      - default: 20
        description: Result limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Result offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LogListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get logs
      tags:
      - logs
  /auth/authorize:
    get:
      description: Redirects to the Identity Provider authorization endpoint.
      produces:
      - application/json
      responses:
        "302":
          description: Redirect to IDP
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Redirect to IDP
      tags:
      - Auth
  /auth/callback:
    post:
      consumes:
      - application/json
      description: Exchanges authorization code for tokens and sets cookie.
      parameters:
      - description: Authorization code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CallbackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Status ok
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid payload
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: OIDC Callback
      tags:
      - Auth
  /auth/logout:
    post:
      description: Clears the access cookie, deletes RTs, and notifies IDP.
      produces:
      - application/json
      responses:
        "200":
          description: Status logged out
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout User
      tags:
      - Auth
  /auth/refresh:
    post:
      description: Rotates access/refresh tokens using the stored session.
      produces:
      - application/json
      responses:
        "200":
          description: Status refreshed
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Refresh Session
      tags:
      - Auth
  /user/{id}/name:
    patch:
      consumes:
      - application/json
      description: Proxies name update to IDP and synchronizes with local database.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Name Data
        in: body
        name: name
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserNameRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user name
      tags:
      - User
  /user/password/change:
    patch:
      consumes:
      - application/json
      description: Proxies current user's password change request to the Identity
        Provider.
      parameters:
      - description: Password Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - User
  /user/password/forgot:
    patch:
      consumes:
      - application/json
      description: Proxies password reset request by email to the Identity Provider.
      parameters:
      - description: Email Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePasswordByEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Forgot password
      tags:
      - User
  /userinfo:
    get:
      description: Fetches the current user's profile from the IDP or database.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user info
      tags:
      - User
  /users/access:
    get:
      description: Fetches detailed access information by proxying to the IDP.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ClientDetailedAccessResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get detailed user access
      tags:
      - User Access
securityDefinitions:
  BearerAuth:
    description: Type "Bearer <your_token>"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
